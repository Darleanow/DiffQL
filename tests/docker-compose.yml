services:
  db_origin:
    image: mariadb:latest
    container_name: diffql_db_origin
    environment:
      MARIADB_ROOT_PASSWORD: toor
      MARIADB_DATABASE: nation
    ports:
      - "3306:3306"
    volumes:
      - ../SampleDB/MariaDB/nation.sql:/docker-entrypoint-initdb.d/nation.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_dest:
    image: mariadb:latest
    container_name: diffql_db_dest
    environment:
      MARIADB_ROOT_PASSWORD: toor
      MARIADB_DATABASE: nation2
    ports:
      - "3307:3306"
    volumes:
      - ../SampleDB/MariaDB/nation2.sql:/docker-entrypoint-initdb.d/nation2.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10